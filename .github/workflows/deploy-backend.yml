name: Deploy Backend (Railway)

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/bazi-core/**'
      - 'package.json'
      - 'railway.toml'
      - 'apps/api/package.json'

jobs:
  deploy-railway:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install Railway CLI
        run: npm install -g @railway/cli
          
      - name: Login Railway
        run: railway login --interactive=false --token=${{ secrets.RAILWAY_TOKEN }}
        
      - name: Link Project
        run: railway link ${{ secrets.RAILWAY_PROJECT_ID }} --token=${{ secrets.RAILWAY_TOKEN }}
        
      - name: Deploy
        run: railway up --token=${{ secrets.RAILWAY_TOKEN }}
        
      - name: Get Deployment URL
        run: railway domain
