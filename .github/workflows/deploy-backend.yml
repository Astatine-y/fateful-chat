name: Deploy Backend (Railway)

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/bazi-core/**'
      - 'package.json'
      - 'railway.toml'
      - 'apps/api/package.json'

jobs:
  deploy-railway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Deploy to Railway
        run: npx @railway/cli deploy --token ${{ secrets.RAILWAY_TOKEN }}