name: Deploy Frontend (Vercel)

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/ui/**'
      - 'packages/bazi-core/**'
      - 'package.json'
      - 'vercel.json'
      - 'next.config.js'

jobs:
  deploy-vercel:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Project
        run: npm run build --workspace=apps/web
        
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod'
          vercel-project-name: 'fateful-chat'
          vercel-org-id: 'team_${{ secrets.VERCEL_ORG_ID }}'
          vercel-production-environment: 'Production'
